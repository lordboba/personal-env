name: Build notarized DMG

on:
  workflow_dispatch:
    inputs:
      publish_to_repo:
        description: "Commit the notarized DMG back to the current branch for Vercel to deploy"
        required: true
        type: boolean
        default: true
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  notarize:
    name: Sign and notarize macOS DMG
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Import Developer ID certificate
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/personal-env-signing.keychain-db"

          echo "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

      - name: Verify signing identity
        run: security find-identity -v -p codesigning

      - name: Run Swift tests
        run: swift test

      - name: Resolve release metadata
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="0.1.0"
          fi
          echo "PERSONAL_ENV_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "PERSONAL_ENV_BUILD=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"

      - name: Install DMG layout dependencies
        run: |
          python3 -m venv "$RUNNER_TEMP/personal-env-venv"
          "$RUNNER_TEMP/personal-env-venv/bin/python" -m pip install Pillow
          echo "$RUNNER_TEMP/personal-env-venv/bin" >> "$GITHUB_PATH"

      - name: Build, sign, notarize, and verify DMG
        env:
          PERSONAL_ENV_SIGN_IDENTITY: ${{ secrets.PERSONAL_ENV_SIGN_IDENTITY }}
          PERSONAL_ENV_APPLE_ID: ${{ secrets.PERSONAL_ENV_APPLE_ID }}
          PERSONAL_ENV_APPLE_TEAM_ID: ${{ secrets.PERSONAL_ENV_APPLE_TEAM_ID }}
          PERSONAL_ENV_APPLE_APP_PASSWORD: ${{ secrets.PERSONAL_ENV_APPLE_APP_PASSWORD }}
          PERSONAL_ENV_NOTARIZE: "1"
          PERSONAL_ENV_APPLY_DMG_LAYOUT: "1"
          PERSONAL_ENV_SPARKLE_FEED_URL: https://personal-env.vercel.app/appcast.xml
          PERSONAL_ENV_SPARKLE_PUBLIC_KEY: ${{ secrets.PERSONAL_ENV_SPARKLE_PUBLIC_KEY }}
        run: bash scripts/package-macos.sh

      - name: Generate Sparkle appcast
        env:
          PERSONAL_ENV_DOWNLOAD_BASE_URL: https://personal-env.vercel.app
          PERSONAL_ENV_SPARKLE_PRIVATE_KEY: ${{ secrets.PERSONAL_ENV_SPARKLE_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "${PERSONAL_ENV_SPARKLE_PRIVATE_KEY}" ]]; then
            echo "PERSONAL_ENV_SPARKLE_PRIVATE_KEY secret is required to generate the Sparkle appcast." >&2
            exit 1
          fi
          SPARKLE_PRIVATE_KEY_FILE="$RUNNER_TEMP/personal-env-sparkle-private-key"
          printf '%s' "$PERSONAL_ENV_SPARKLE_PRIVATE_KEY" > "$SPARKLE_PRIVATE_KEY_FILE"
          chmod 600 "$SPARKLE_PRIVATE_KEY_FILE"
          PERSONAL_ENV_SPARKLE_PRIVATE_KEY_FILE="$SPARKLE_PRIVATE_KEY_FILE" bash scripts/generate-appcast.sh

      - name: Upload notarized DMG
        uses: actions/upload-artifact@v4
        with:
          name: Personal-Env-macOS-dmg
          path: download-site/public/downloads/Personal-Env-macOS.dmg
          if-no-files-found: error

      - name: Upload Sparkle appcast
        uses: actions/upload-artifact@v4
        with:
          name: Personal-Env-appcast
          path: download-site/public/appcast.xml
          if-no-files-found: error

      - name: Commit notarized DMG for Vercel
        if: ${{ github.event_name == 'push' || inputs.publish_to_repo }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add download-site/public/downloads/Personal-Env-macOS.dmg download-site/public/appcast.xml
          if git diff --cached --quiet; then
            echo "No release artifact changes to commit."
          else
            git commit -m "Update notarized macOS release artifacts"
            git push
          fi
